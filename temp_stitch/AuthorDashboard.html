<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-size: 20px; }
    </style>
<title>BlogSpace - Author Dashboard</title>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar -->
<aside class="w-[220px] flex-shrink-0 border-r border-primary/10 bg-white dark:bg-background-dark flex flex-col">
<div class="p-6 border-b border-primary/5">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined">auto_stories</span>
<h1 class="text-lg font-bold tracking-tight">BlogSpace</h1>
</div>
<p class="text-xs text-slate-500 mt-1 uppercase tracking-wider font-semibold">Author Dashboard</p>
</div>
<nav class="flex-1 p-4 space-y-1">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 transition-colors" href="#">
<span class="material-symbols-outlined">description</span>
<span class="text-sm font-medium">My Posts</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white shadow-sm shadow-primary/20" href="#">
<span class="material-symbols-outlined">add_box</span>
<span class="text-sm font-medium">New Post</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 transition-colors" href="#">
<span class="material-symbols-outlined">edit_note</span>
<span class="text-sm font-medium">Drafts</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 transition-colors" href="#">
<span class="material-symbols-outlined">check_circle</span>
<span class="text-sm font-medium">Published</span>
</a>
</nav>
<div class="p-4 border-t border-primary/5">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-sm font-medium">Settings</span>
</a>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-background-dark/50">
<!-- Header -->
<header class="h-16 border-b border-primary/10 flex items-center justify-between px-8 bg-white dark:bg-background-dark">
<div class="flex items-center gap-4">
<h2 class="text-lg font-semibold text-slate-800 dark:text-slate-100">Create New Post</h2>
</div>
<div class="flex items-center gap-3">
<button class="p-2 rounded-lg text-slate-500 hover:bg-primary/5">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</header>
<!-- Editor Area -->
<div class="flex-1 flex overflow-hidden">
<div class="flex-1 overflow-y-auto p-8 lg:p-12">
<div class="max-w-3xl mx-auto space-y-6">
<!-- Title Input -->
<div class="space-y-1">
<input class="w-full text-4xl font-bold border-none focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 bg-transparent p-0" placeholder="Post title..." type="text"/>
</div>
<!-- Toolbar -->
<div class="flex flex-wrap items-center gap-1 py-2 border-y border-primary/5">
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">format_bold</span></button>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">format_italic</span></button>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">format_list_bulleted</span></button>
<div class="w-px h-6 bg-primary/10 mx-1"></div>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">link</span></button>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">image</span></button>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">code</span></button>
<button class="p-2 rounded hover:bg-primary/5 text-slate-600"><span class="material-symbols-outlined">format_quote</span></button>
</div>
<!-- Content Area -->
<textarea class="w-full min-h-[500px] text-lg border-none focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 bg-transparent p-0 resize-none leading-relaxed" placeholder="Write your story here..."></textarea>
</div>
</div>
<!-- Right Sidebar -->
<aside class="w-[300px] border-l border-primary/10 bg-slate-50 dark:bg-background-dark/40 overflow-y-auto p-6 flex flex-col gap-8">
<!-- Actions -->
<div class="space-y-3">
<div class="flex items-center justify-between mb-4">
<span class="text-xs font-bold uppercase tracking-widest text-slate-400">Status</span>
<span class="px-2 py-0.5 rounded bg-slate-200 dark:bg-slate-800 text-[10px] font-bold text-slate-600 dark:text-slate-400 uppercase">Draft</span>
</div>
<button class="w-full py-2.5 bg-primary text-white rounded-lg font-semibold text-sm hover:bg-primary/90 transition-colors shadow-sm shadow-primary/20">Publish Post</button>
<button class="w-full py-2.5 bg-white dark:bg-slate-800 border border-primary/10 text-slate-700 dark:text-slate-300 rounded-lg font-semibold text-sm hover:bg-slate-50 transition-colors">Save Draft</button>
</div>
<!-- Config -->
<div class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">Category</label>
<select class="w-full bg-white dark:bg-slate-800 border border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary px-3 py-2">
<option>Select category</option>
<option>Technology</option>
<option>Design</option>
<option>Tutorial</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">Tags</label>
<div class="flex flex-wrap gap-2 p-2 bg-white dark:bg-slate-800 border border-primary/10 rounded-lg min-h-[42px]">
<span class="bg-primary/10 text-primary text-[10px] px-2 py-1 rounded font-bold flex items-center gap-1">UI DESIGN <span class="material-symbols-outlined !text-[14px] cursor-pointer">close</span></span>
<span class="bg-primary/10 text-primary text-[10px] px-2 py-1 rounded font-bold flex items-center gap-1">WEB <span class="material-symbols-outlined !text-[14px] cursor-pointer">close</span></span>
<input class="border-none focus:ring-0 text-sm p-0 w-16 bg-transparent" placeholder="Add..." type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">URL Slug</label>
<div class="flex items-center">
<span class="text-xs text-slate-400 pr-1">/blog/</span>
<input class="flex-1 bg-white dark:bg-slate-800 border border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary px-2 py-1" type="text" value="new-post-title"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">Excerpt</label>
<textarea class="w-full bg-white dark:bg-slate-800 border border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary px-3 py-2 resize-none" placeholder="Brief summary for search results..." rows="4"></textarea>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">Featured Image</label>
<div class="relative group aspect-video rounded-xl bg-primary/5 border-2 border-dashed border-primary/10 overflow-hidden cursor-pointer hover:border-primary/30 transition-all flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined mb-1">add_a_photo</span>
<span class="text-[10px] font-bold">UPLOAD IMAGE</span>
<img class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-10 transition-opacity" data-alt="Abstract soft blue gradient background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDu5O8aWWX3P2Do8KoOrnvyr99x-XrCSrg2clcNjNOR-YjDGpBmaG5cyAXLfjhygSwUlM0p8QK5MlvUj6hUPr_K_supn-6n6rjrzamEDNeQI3it6g27XrCO1LX3WgeJ7VFZfpylkZQc-tEmMNq2Nt8eL3ydclI4Kj0WAGW5benwTYJeFi7ef3j05ZsToWscTUohjTPiuUks74BfshpAHeJFh6MugMlaf-wL30xOgvTlUHL9xHuGMDl41BovyDWNet-GQZqZyuvGXfY"/>
</div>
</div>
</div>
</aside>
</div>
</main>
</div>
</body></html>
