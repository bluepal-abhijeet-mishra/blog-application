<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>BlogSpace Auth</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-6 md:p-12">
<div class="max-w-6xl w-full flex flex-col lg:flex-row gap-8 justify-center items-start">
<!-- Login Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800">
<div class="p-8">
<div class="flex items-center gap-2 mb-8">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">BlogSpace</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 mb-8">Enter your credentials to access your account</p>
<div class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4" placeholder="email@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<div class="relative">
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-end">
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-12 rounded-lg transition-colors">
                        Log in
                    </button>
<div class="pt-4 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                            Don't have an account? 
                            <a class="text-primary font-semibold hover:underline" href="#">Create account</a>
</p>
</div>
</div>
</div>
<div class="h-1 bg-primary w-full"></div>
</div>
<!-- Register Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800">
<div class="p-8">
<div class="flex items-center gap-2 mb-8">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">BlogSpace</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Create account</h2>
<p class="text-slate-500 dark:text-slate-400 mb-8">Join our community of writers and readers</p>
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Display Name</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4" placeholder="email@example.com" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Confirm</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Role</label>
<select class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4">
<option selected="" value="reader">Reader</option>
<option value="writer">Writer</option>
<option value="editor">Editor</option>
</select>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-12 rounded-lg mt-4 transition-colors">
                        Register
                    </button>
<div class="pt-2 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500">
                            By clicking Register, you agree to our Terms and Privacy Policy.
                        </p>
</div>
</div>
</div>
<div class="h-1 bg-primary w-full"></div>
</div>
</div>
</body></html>
